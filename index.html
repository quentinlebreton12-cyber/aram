<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAM Club</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* --- CONFIGURATION DES THEMES --- */
:root {
  --bg-body: #f4f3ef; --text-body: #1a1a1a; --bg-card: #ffffff;
  --border-color: #e0e0e0; --border-input: #ddd; --bg-input: #f8f8f8;
  --text-muted: #666; --text-light: #888; --text-very-light: #aaa;
  --row-hover: #f9f9f7; --overlay-bg: rgba(0,0,0,0.5); --picker-bg: #fff;
  --cancel-btn-bg: #f0f0f0; --cancel-btn-hover: #e8e8e8;
  --bg-rec: #EAF3DE; --bg-rec-hover: #C0DD97;
  --bg-ban: #FCEBEB; --bg-ban-hover: #F7C1C1;
  --text-rec: #3B6D11; --text-ban: #A32D2D;
  --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  --card-gradient: linear-gradient(145deg, #ffffff, #fcfcf9);
}

[data-theme="dark"] {
  --bg-body: #0f1015; --text-body: #fffffe; --bg-card: #1f232b;
  --border-color: #2d323f; --border-input: #3a4150; --bg-input: #16181d;
  --text-muted: #a0a5b5; --text-light: #7e8494; --text-very-light: #535866;
  --row-hover: #262b35; --overlay-bg: rgba(0,0,0,0.75); --picker-bg: #1f232b;
  --cancel-btn-bg: #16181d; --cancel-btn-hover: #262b35;
  --bg-rec: rgba(99, 153, 34, 0.15); --bg-rec-hover: rgba(99, 153, 34, 0.25);
  --bg-ban: rgba(163, 45, 45, 0.15); --bg-ban-hover: rgba(163, 45, 45, 0.25);
  --text-rec: #8cee8c; --text-ban: #ff8585;
  --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
  --card-gradient: linear-gradient(145deg, #242933, #1a1d24);
}

body { 
  font-family: system-ui, sans-serif; 
  background: var(--bg-body); 
  color: var(--text-body); 
  min-height: 100vh; 
  position: relative;
  transition: background 0.2s, color 0.2s; 
}

body::before {
  content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-image: url('https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/content/src/leagueclient/createroom/map-howlingabyss-1.jpg');
  background-size: cover; background-position: center; opacity: 0.04; pointer-events: none; z-index: -1;
}

.container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { padding-bottom: 1rem; border-bottom: 1px solid var(--border-input); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 500; }
.header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.theme-toggle { background: transparent; border: 1px solid var(--border-input); padding: 6px 12px; border-radius: 8px; cursor: pointer; color: var(--text-body); display: flex; align-items: center; gap: 6px; font-size: 12px; transition: all 0.1s; }
.theme-toggle:hover { background: var(--row-hover); }

/* GRILLES ET TABS */
.players-grid, .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 16px; }
.stats-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: transparent; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.1s; }
.tab:hover { color: var(--text-body); }
.tab.active { color: var(--text-body); border-bottom-color: var(--text-body); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* COMPOSANTS CARTES */
.player-card, .stats-player-card, .screenshot-section { 
  background: var(--card-gradient); 
  border: 1px solid var(--border-color); 
  border-radius: 12px; 
  overflow: hidden; 
  box-shadow: var(--card-shadow);
  transition: background 0.2s, border-color 0.2s; 
}

.player-header, .stats-player-header, .screenshot-header { 
  padding: 12px; 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border-color); 
}
.stats-player-header { background: rgba(255,255,255,0.01); }
.player-avatar, .screenshot-header-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; }
.screenshot-header-avatar { background: rgba(0,0,0,0.05); color: var(--text-body); }
.player-name, .stats-player-name { font-size: 14px; font-weight: 600; color: var(--text-body); }
.player-pseudo, .stats-player-summary { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 1px; }
.stats-player-summary { font-style: normal; margin-top: 2px; flex: 1; }
.stats-player-info { flex: 1; }

.search-bar { position: relative; padding: 6px 10px; }
.search-bar input { width: 100%; padding: 6px 8px 6px 28px; font-size: 12px; border: 1px solid var(--border-input); border-radius: 8px; background: var(--bg-input); color: var(--text-body); outline: none; }
.search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-very-light); }

/* LISTE DES CHAMPIONS */
.champ-list, .stats-champ-list { display: flex; flex-direction: column; gap: 4px; padding: 10px; }
.champ-row, .stats-champ-row { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 6px 10px; border-radius: 6px; box-sizing: border-box;
  border: 1px solid rgba(255, 255, 255, 0.02); transition: background 0.1s; 
}
.champ-row:hover { background: var(--row-hover); filter: brightness(1.05); }
.champ-row.recommended { background: var(--bg-rec); }
.champ-row.recommended:hover { background: var(--bg-rec-hover); }
.champ-row.banned { background: var(--bg-ban); }
.champ-row.banned:hover { background: var(--bg-ban-hover); }
.champ-name, .stats-champ-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-body); }
.stats-champ-name { font-weight: 500; }
.champ-row.recommended .champ-name { color: var(--text-rec); font-weight: 600; }
.champ-row.banned .champ-name { color: var(--text-ban); font-weight: 500; text-decoration: line-through; }

/* VOTES ET BADGES */
.vote-area { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.vbtn { width: 22px; height: 22px; border: 1px solid var(--border-input); border-radius: 6px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-light); transition: all 0.1s; }
.vbtn.up:hover { background: var(--bg-rec); border-color: #97C459; color: var(--text-rec); }
.vbtn.down:hover { background: var(--bg-ban); border-color: #F09595; color: var(--text-ban); }
.vcnt { font-size: 10px; font-weight: 500; min-width: 12px; text-align: center; color: var(--text-very-light); }
.vcnt.up-active { color: var(--text-rec); font-weight: bold; }
.vcnt.down-active { color: var(--text-ban); font-weight: bold; }
.status-badge { font-size: 10px; font-weight: 500; border-radius: 4px; padding: 2px 6px; white-space: nowrap; }
.badge-rec { background: #639922; color: #fff; }
.badge-ban { background: #A32D2D; color: #fff; }

/* PANEL BAS & SQUAD TYPE */
.bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
@media (max-width: 768px) { .bottom-panels { grid-template-columns: 1fr; } }
.team-slots { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px; }
.champ-slot { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.champ-slot img, .stats-champ-icon, .result-champ-icon { width: 54px; height: 54px; border-radius: 8px; border: 2px solid #639922; object-fit: cover; box-shadow: 0 0 10px rgba(99,153,34,0.4); }
.stats-champ-icon { width: 28px; height: 28px; border-radius: 5px; border: none; box-shadow: none; }
.result-champ-icon { width: 32px; height: 32px; border-radius: 6px; border: none; box-shadow: none; }
.champ-slot img.banned-for { border-color: var(--text-ban); opacity: 0.4; box-shadow: none; }
.champ-slot .slot-name { font-size: 11px; font-weight: 500; color: var(--text-body); text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.champ-slot .slot-role { font-size: 10px; color: var(--text-muted); }
.team-empty, .no-games { font-size: 12px; color: var(--text-very-light); padding: 16px; text-align: center; }

.fun-stats-list { display: flex; flex-direction: column; gap: 8px; padding: 12px; font-size: 13px; }
.fun-stat-row { display: flex; align-items: center; gap: 8px; }
.fun-stat-text b { color: var(--text-body); }

/* SCREENSHOT ZONE */
.screenshot-body { padding: 16px; }
.drop-zone { border: 2px dashed var(--border-input); border-radius: 12px; padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; background: var(--bg-input); transition: all 0.2s ease; }
.drop-zone:hover, .drop-zone.dragover { border-color: #639922; background: var(--bg-rec-hover); color: var(--text-rec); }
#file-input { display: none; }

.analyzing-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border-input); border-top-color: #639922; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { background: var(--bg-ban); color: var(--text-ban); padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; font-weight: 500; }

/* EDIT INTERFACE & SPECIFICS */
.result-card { border: 1px solid var(--border-color); border-radius: 10px; overflow: hidden; margin-top: 12px; background: rgba(0,0,0,0.02); }
.result-row { display: flex; align-items: center; padding: 8px 14px; gap: 12px; border-top: 1px solid var(--border-color); font-size: 13px; color: var(--text-body); }
.result-player { font-weight: 600; min-width: 80px; }
.result-champ { flex: 1; }
.result-champ-select { background: var(--bg-input); color: var(--text-body); border: 1px solid var(--border-input); border-radius: 6px; padding: 3px 6px; font-size: 12px; outline: none; cursor: pointer; max-width: 140px; }
.result-kda, .stats-kda { font-size: 12px; min-width: 70px; text-align: center; color: var(--text-muted); }
.stats-kda { min-width: 60px; }
.result-dmg, .stats-dmg { font-size: 12px; color: var(--text-muted); min-width: 50px; text-align: right; }
.stats-dmg { color: var(--text-light); font-size: 11px; min-width: 55px; }
.result-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-confirm { flex: 1; padding: 10px; background: #3B6D11; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-retry { padding: 10px 16px; background: var(--cancel-btn-bg); color: var(--text-muted); border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
.btn-confirm:hover { filter: brightness(1.1); }
.btn-retry:hover { background: var(--cancel-btn-hover); }

.stats-winrate { font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 4px; }
.stats-winrate.good { background: var(--bg-rec); color: var(--text-rec); }
.stats-winrate.bad  { background: var(--bg-ban); color: var(--text-ban); }
.stats-winrate.mid  { background: var(--bg-input); color: var(--text-muted); }

/* MODALE MODULAIRE */
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
.picker { background: var(--picker-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 1.25rem; width: 300px; box-shadow: var(--card-shadow); }
.voter-btn { padding: 8px 12px; border: 1px solid var(--border-input); border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; color: var(--text-body); display: flex; align-items: center; gap: 8px; width: 100%; margin-top: 6px; transition: all 0.1s; }
.voter-btn:hover { background: var(--row-hover); }
.voter-btn.already-voted { border-color: var(--text-ban); background: var(--bg-ban); color: var(--text-ban); }
.voter-btn i { margin-left: auto; }
.voter-mini-avatar { width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.voter-mini-avatar svg { width: 100%; height: 100%; }
.cancel-btn { width: 100%; padding: 8px; background: var(--cancel-btn-bg); color: var(--text-muted); border: none; border-radius: 8px; margin-top: 12px; cursor: pointer; font-size: 13px; transition: all 0.1s; font-weight: 500; }
.cancel-btn:hover { background: var(--cancel-btn-hover); color: var(--text-body); }

.footer { text-align: center; font-size: 11px; color: var(--text-very-light); padding: 1.5rem 0 0.5rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1><i class="ti ti-sword" style="font-size:18px;vertical-align:-2px;margin-right:6px;color:#639922"></i>ARAM Club</h1>
      <p>Bans, recommandations & stats de performance</p>
    </div>
    <div class="header-right">
      <button id="theme-toggle" class="theme-toggle">
        <i class="ti ti-sun" id="theme-icon"></i><span id="theme-text">Clair</span>
      </button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('bans')">⚔️ Bans & Votes</button>
    <button class="tab" onclick="switchTab('stats')">📊 Stats par joueur</button>
    <button class="tab" onclick="switchTab('screenshot')">📸 Ajouter une partie</button>
    <button class="tab" onclick="switchTab('history')">📜 Historique</button>
  </div>

  <div id="tab-bans" class="tab-content active">
    <div class="players-grid" id="players-grid"></div>
    <div class="bottom-panels">
      <div class="player-card">
        <div class="player-header">
          <div class="player-avatar" style="background:rgba(255,217,102,0.2);color:#FFD966;">👑</div>
          <div><div class="player-name">Équipe type</div></div>
        </div>
        <div id="team-content"></div>
      </div>
      <div class="player-card">
        <div class="player-header">
          <div class="player-avatar" style="background:rgba(214,204,255,0.2);color:#D6CCFF;">📊</div>
          <div><div class="player-name">Stats de salon</div></div>
        </div>
        <div id="fun-content"></div>
      </div>
    </div>
  </div>

  <div id="tab-stats" class="tab-content">
    <div class="stats-grid" id="stats-grid"></div>
  </div>

  <div id="tab-history" class="tab-content">
    <div class="stats-grid" id="history-list"></div>
  </div>

  <div id="tab-screenshot" class="tab-content">
    <div class="screenshot-section">
      <div class="screenshot-header">
        <div class="screenshot-header-avatar"><i class="ti ti-camera"></i></div>
        <div>
          <div class="player-name">Importer une partie</div>
          <div class="player-pseudo">Fichier de capture d'écran de fin de jeu</div>
        </div>
      </div>
      <div class="screenshot-body">
        <div id="drop-area">
          <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
            <i class="ti ti-screenshot" style="font-size:32px;margin-bottom:8px;display:block;color:var(--text-light)"></i>
            <p>Dépose ton screenshot ici</p>
            <small style="color:var(--text-very-light)">ou clique pour parcourir</small>
          </div>
          <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
        </div>
        <div id="analyze-result"></div>
        
        <div class="player-card" style="margin-top: 20px; padding: 14px;">
          <div style="font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 6px;">
            <i class="ti ti-history" style="font-size:16px;"></i> Historique des parties enregistrées
          </div>
          <div id="screenshot-history-list" style="display: flex; flex-direction: column; gap: 6px;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">3 votes pour verrouiller · Dashboard Privé ARAM Club</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this) window.closePicker()">
  <div class="picker" id="picker">
    <h3 id="picker-title" style="font-size:15px;margin-bottom:4px"></h3>
    <p id="picker-sub" style="font-size:12px;color:var(--text-muted);margin-bottom:12px"></p>
    <div class="voter-list" id="voter-list"></div>
    <button class="cancel-btn" onclick="window.closePicker()">Fermer</button>
  </div>
</div>

<script type="module">

function getChampIcon(name) {
  const k = champKey[name] || name.replace(/[^a-zA-Z]/g,'');
  return DDRAGON + k + ".png";
}

// MANAGEMENT DU THEME
const toggleBtn = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
const themeText = document.getElementById('theme-text');

const setTheme = (theme) => {
  if (theme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    themeIcon.className = 'ti ti-sun'; themeText.textContent = 'Clair';
  } else {
    document.documentElement.removeAttribute('data-theme');
    themeIcon.className = 'ti ti-moon'; themeText.textContent = 'Sombre';
  }
  localStorage.setItem('theme', theme);
  updateCardHeadersColors();
};
setTheme(localStorage.getItem('theme') === 'light' ? 'light' : 'dark');
toggleBtn.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

// NAVIGATION DES ONGLETS
window.switchTab = (tab) => {
  const tabs = ['bans','stats','screenshot','history'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', tabs[i] === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'stats') renderStatsTab();
  if (tab === 'history' || tab === 'screenshot') renderAllHistoryContainers();
};

const THRESHOLD = 3;
const players = ["Manu","Arthur","Nathan","Quentin","Aymeric","Vincent"];

onValue(ref(db,'votes'), (snap) => {
  const data = snap.val() || {};
  players.forEach(p => { upVotes[p]={}; downVotes[p]={}; });
  if (data.upVotes)   for (const t in data.upVotes)   for (const c in data.upVotes[t])   { upVotes[t][c]   = new Set(Object.keys(data.upVotes[t][c])); }
  if (data.downVotes) for (const t in data.downVotes) for (const c in data.downVotes[t]) { downVotes[t][c] = new Set(Object.keys(data.downVotes[t][c])); }
  players.forEach(p => renderPlayer(p));
  refreshCalculatedPanels();
});

// CENTRALISATION DE L'HISTORIQUE (Supprime la duplication de renderHistoryList & renderHistoryTab)
window.renderAllHistoryContainers = () => {
  const tabHistory = document.getElementById('history-list');
  const screenshotHistory = document.getElementById('screenshot-history-list');
  const entries = Object.entries(gameStats).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));

  if (screenshotHistory) {
    screenshotHistory.innerHTML = entries.length === 0 
      ? '<div style="font-size: 12px; color: var(--text-very-light); font-style: italic; text-align:center; padding:10px;">Aucune partie.</div>'
      : '';
  }
  if (tabHistory) {
    tabHistory.innerHTML = entries.length === 0 
      ? '<div class="no-games">Aucune partie enregistrée.</div>' 
      : '';
  }
  if (entries.length === 0) return;

  entries.forEach(([id, game]) => {
    const dateStr = game.timestamp ? new Date(game.timestamp).toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : 'Date inconnue';
    const statusLabel = game.victory ? '🏆 Victoire' : '💀 Défaite';
    const statusClass = game.victory ? 'var(--text-rec)' : 'var(--text-ban)';
    const bgStatus = game.victory ? 'var(--bg-rec)' : 'var(--bg-ban)';

    // Rendu 1 : Mini historique onglet Captures
    if (screenshotHistory) {
      const compositions = game.players ? game.players.map(p => p.champion || '?').join(', ') : 'Données incomplètes';
      const row = document.createElement('div');
      row.style.cssText = "display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 8px; font-size: 12px;";
      row.innerHTML = `
        <div style="min-width: 0; flex: 1; padding-right: 8px;">
          <div><span style="color:${statusClass}; font-weight:bold;">${statusLabel}</span> — <span style="color:var(--text-muted);">${dateStr}</span></div>
          <div style="font-size: 10px; color: var(--text-very-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;">${compositions}</div>
        </div>
        <button onclick="deleteGame('${id}')" style="background: transparent; border: none; cursor: pointer; font-size: 14px; padding: 4px;" title="Supprimer la partie">🗑️</button>
      `;
      screenshotHistory.appendChild(row);
    }

    // Rendu 2 : Grand historique onglet Historique complet
    if (tabHistory && document.getElementById('tab-history').classList.contains('active')) {
      const card = document.createElement('div');
      card.className = 'stats-player-card';
      card.style.cssText = 'margin-bottom:14px; grid-column: 1 / -1; width:100%';
      let html = `<div class="stats-player-header" style="background:${bgStatus}; color:${statusClass}">

      </div>`;

        game.players.forEach(p => {

// MANAGEMENT DU MODULE MODAL DE VOTE
window.closePicker = () => { document.getElementById('overlay').style.display='none'; pendingVote=null; };
window.castVote    = (voter) => { const {type,target,champ}=pendingVote; set(ref(db,`votes/${type==='up'?'upVotes':'downVotes'}/${target}/${champ}/${voter}`),true).then(()=>window.closePicker()); };
window.removeVote  = (voter) => { const {type,target,champ}=pendingVote; set(ref(db,`votes/${type==='up'?'upVotes':'downVotes'}/${target}/${champ}/${voter}`),null).then(()=>window.closePicker()); };

function openPicker(type, target, champ) {
  if ((type==='up' && isRec(target,champ)) || (type==='down' && isBanned(target,champ))) return;
  pendingVote = {type,target,champ};
  const voters = type==='up' ? getUp(target,champ) : getDown(target,champ);
  document.getElementById('picker-title').textContent = `${type==='up'?'Recommander':'Bannir'} ${champ} pour ${target}`;
  document.getElementById('picker-sub').textContent   = `${voters.size}/${THRESHOLD} votes — qui es-tu ?`;
  document.getElementById('picker').className = `picker picker-type-${type}`;
  
  const list = document.getElementById('voter-list');
  list.innerHTML = '';
  players.filter(p => p !== target).forEach(voter => {
    const already = voters.has(voter);
    const btn = document.createElement('button');
    btn.className = 'voter-btn' + (already ? ' already-voted' : '');
    btn.innerHTML = `<span class="voter-mini-avatar" style="background:${playerColors[voter].bg};border:1px solid ${playerColors[voter].border}">${avatarSVGs[voter]}</span>
                     <span>${voter}</span>${already ? '<i class="ti ti-x"></i>' : ''}`;
    btn.onclick = () => already ? window.removeVote(voter) : window.castVote(voter);
    list.appendChild(btn);
  });
  document.getElementById('overlay').style.display = 'flex';
}

function renderPlayer(player) {
  const card = document.getElementById('card-'+player);
  if (!card) return;
  const search = searches[player].toLowerCase();
  
  let filtered = champions.filter(c => !search ? (isRec(player, c) || isBanned(player, c) || getUp(player, c).size > 0 || getDown(player, c).size > 0) : c.toLowerCase().includes(search));

  filtered.sort((a,b) => {
    if (isBanned(player,a) && !isBanned(player,b)) return -1;
    if (!isBanned(player,a) && isBanned(player,b)) return 1;
    if (isRec(player,a) && !isRec(player,b)) return -1;
    if (!isRec(player,a) && isRec(player,b)) return 1;
    return (getUp(player,b).size + getDown(player,b).size) - (getUp(player,a).size + getDown(player,a).size) || a.localeCompare(b);
  });
  
  const listEl = card.querySelector('.champ-list');
  listEl.innerHTML = filtered.length === 0 
    ? `<div style="font-size:11px; color:var(--text-very-light); text-align:center; padding:16px 8px; font-style:italic;">${search ? "Aucun champion trouvé" : "🔍 Cherche un champion pour voter"}</div>`
    : '';

  filtered.forEach(champ => {
    const rec=isRec(player,champ), banned=isBanned(player,champ);
    const upV=getUp(player,champ), downV=getDown(player,champ);
    const row=document.createElement('div');
    row.className='champ-row'+(rec?' recommended':banned?' banned':'');
    
    if (rec || banned) {
      row.innerHTML = `<span class="champ-name">${champ}</span><span class="status-badge ${rec?'badge-rec':'badge-ban'}" title="Par : ${Array.from(rec?upV:downV).join(', ')}">${rec?'recommandé':'banni'}</span>`;
    } else {
      row.innerHTML = `<span class="champ-name">${champ}</span>
        <div class="vote-area">
          <span class="vcnt ${upV.size>0?'up-active':''}" title="${upV.size>0?'Votes de : '+Array.from(upV).join(', '):''}">${upV.size||''}</span>
          <button class="vbtn up" title="Recommander" onclick="openPicker('up','${player}','${champ}')"><i class="ti ti-thumb-up"></i></button>
          <span class="vcnt ${downV.size>0?'down-active':''}" title="${downV.size>0?'Votes de : '+Array.from(downV).join(', '):''}">${downV.size||''}</span>
          <button class="vbtn down" title="Bannir" onclick="openPicker('down','${player}','${champ}')"><i class="ti ti-thumb-down"></i></button>
        </div>`;
    }
    listEl.appendChild(row);
  });
}

function buildGrid() {
  const grid=document.getElementById('players-grid');
  if(!grid) return;
  players.forEach(player => {
    const card=document.createElement('div'); card.className='player-card'; card.id='card-'+player;
    card.innerHTML= `
      <div class="player-header">
        <div class="player-avatar">${avatarSVGs[player]}</div>
        <div><div class="player-name">${player}</div><div class="player-pseudo">${pseudos[player]}</div></div>
      </div>
      <div class="search-bar"><i class="ti ti-search"></i><input type="text" placeholder="Rechercher pour voter..." id="search-${player}"></div>
      <div class="champ-list"></div>`;
    grid.appendChild(card);
    document.getElementById('search-'+player).addEventListener('input', function() { searches[player]=this.value; renderPlayer(player); });
  });
  updateCardHeadersColors();
}

// LOGIQUE ALGORITHMIQUE / CALCULS DE COMPOSITION ET FUN STATS
function champScore(champ) {
  let score=0;
  players.forEach(p => { score += getUp(p,champ).size*3 - getDown(p,champ).size*2; if(isRec(p,champ)) score+=10; if(isBanned(p,champ)) score-=15; });
  const wins = Object.values(gameStats).reduce((acc, g) => acc + (g.players?.filter(p=>p.champion===champ && g.victory).length || 0), 0);
  const total = Object.values(gameStats).reduce((acc, g) => acc + (g.players?.filter(p=>p.champion===champ).length || 0), 0);
  if(total > 0) score += ((wins/total) - 0.5) * 20;
  return score;
}

function renderTeamComp() {
  const used=new Set();
  const roles=[{key:'tank',label:'Tank'},{key:'adc',label:'ADC'},{key:'ap',label:'AP'},{key:'support',label:'Support'}];
  const slots=roles.map(r => {
    const best = champions.filter(c=>championRoles[c]===r.key&&!used.has(c)).sort((a,b)=>champScore(b)-champScore(a))[0] || null;
    if(best) used.add(best);
    return {champ:best, label:r.label};
  });
  const flex=champions.filter(c=>!used.has(c)).sort((a,b)=>champScore(b)-champScore(a))[0]||null;
  slots.push({champ:flex,label:'Flex'});
  
  const container=document.getElementById('team-content');
  if(!container) return;
  if(slots.every(s=>!s.champ)){container.innerHTML='<div class="team-empty">Votez pour voir l\'équipe idéale !</div>';return;}
  
  const wrap=document.createElement('div'); wrap.className='team-slots';
  slots.forEach(({champ,label})=>{
    if(!champ) return;
    const wins = Object.values(gameStats).reduce((acc, g) => acc + (g.players?.filter(p=>p.champion===champ && g.victory).length || 0), 0);
    const total = Object.values(gameStats).reduce((acc, g) => acc + (g.players?.filter(p=>p.champion===champ).length || 0), 0);
    const wrText = total > 0 ? ` · ${Math.round((wins/total)*100)}%` : '';

    const slot=document.createElement('div'); slot.className='champ-slot';
    slot.innerHTML = `<img src="${getChampIcon(champ)}" class="${players.some(p=>isBanned(p,champ)) ? 'banned-for' : ''}" onerror="this.style.display='none'">
                      <div class="slot-name">${champ}</div><div class="slot-role">${label}${wrText}</div>`;
    wrap.appendChild(slot);
  });
  container.innerHTML=''; container.appendChild(wrap);
}

function renderFunStats() {
  let biggestVictim=null,biggestVictimBans=0,mostGateau=null,mostGateauRecs=0;
  let mostControversialChamp=null,controversialScore=-1,mostPlayedChamp=null,mostPlayedCount=0;
  let mostWinPlayer=null,mostWinRate=-1;

  players.forEach(p=>{
    const bans=champions.filter(c=>isBanned(p,c)).length, recs=champions.filter(c=>isRec(p,c)).length;
    if(bans>biggestVictimBans){biggestVictim=p;biggestVictimBans=bans;}
    if(recs>mostGateauRecs){mostGateau=p;mostGateauRecs=recs;}
  });

  const playerWins={}, playerGames={}, champGames={};
  Object.values(gameStats).forEach(g => {
    g.players?.forEach(p => {
      playerGames[p.playerName] = (playerGames[p.playerName] || 0) + 1;
      if(g.victory) playerWins[p.playerName] = (playerWins[p.playerName] || 0) + 1;
      if(p.champion) champGames[p.champion] = (champGames[p.champion] || 0) + 1;
    });
  });

  players.forEach(p => { if(playerGames[p]>=1 && (playerWins[p]||0)/playerGames[p] > mostWinRate) { mostWinRate=(playerWins[p]||0)/playerGames[p]; mostWinPlayer=p; } });
  for(const c in champGames){if(champGames[c]>mostPlayedCount){mostPlayedCount=champGames[c];mostPlayedChamp=c;}}

  champions.forEach(c=>{
    let up=0,down=0; players.forEach(p=>{up+=getUp(p,c).size;down+=getDown(p,c).size;});
    const controversy = (up > 0 && down > 0) ? Math.min(up,down) : 0;
    if(controversy > controversialScore){controversialScore=controversy; mostControversialChamp=c;}
  });

  const rows=[
    {emoji:'🎯',text:'Plus ciblé',value:biggestVictim&&biggestVictimBans>0?`${biggestVictim} (${biggestVictimBans} bans)`:null},
    {emoji:'👑',text:'Plus gâté',value:mostGateau&&mostGateauRecs>0?`${mostGateau} (${mostGateauRecs} recs)`:null},
    {emoji:'🏆',text:'Meilleur winrate',value:mostWinPlayer?`${mostWinPlayer} (${Math.round(mostWinRate*100)}% sur ${playerGames[mostWinPlayer]}g)`:null},
    {emoji:'🔥',text:'Disputé',value:mostControversialChamp&&controversialScore>0?mostControversialChamp:null},
    {emoji:'📊',text:'Le favori',value:mostPlayedChamp&&mostPlayedCount>0?`${mostPlayedChamp} (${mostPlayedCount} parties)`:null},
  ];
  
  const container=document.getElementById('fun-content');
  if(!container) return;
  const list=document.createElement('div'); list.className='fun-stats-list';
  rows.forEach(({emoji,text,value})=>{
    list.innerHTML += `<div class="fun-stat-row"><span class="fun-stat-emoji">${emoji}</span><span class="fun-stat-text">${text} : ${value?'<b>'+value+'</b>':'<span style="color:var(--text-very-light)">En attente</span>'}</span></div>`;
  });
  container.innerHTML=''; container.appendChild(list);
}

window.renderStatsTab = function() {
  const grid=document.getElementById('stats-grid'); if(!grid) return;
  grid.innerHTML='';
  players.forEach(player=>{
    const champData={};
    Object.values(gameStats).forEach(g => {
      g.players?.filter(p => p.playerName===player && p.champion).forEach(p => {
        const c=p.champion; if(!champData[c]) champData[c]={wins:0,games:0,kills:0,deaths:0,assists:0,damage:0};
        champData[c].games++; if(g.victory) champData[c].wins++;
        champData[c].kills+=p.kills||0; champData[c].deaths+=p.deaths||0; champData[c].assists+=p.assists||0; champData[c].damage+=p.damage||0;
      });
    });
    
    const sorted=Object.entries(champData).sort((a,b)=>b[1].games-a[1].games);
    const totalGames=Object.values(champData).reduce((s,v)=>s+v.games,0);
    const totalWins =Object.values(champData).reduce((s,v)=>s+v.wins,0);
    const card=document.createElement('div'); card.className='stats-player-card';
    card.innerHTML= `
      <div class="stats-player-header">
        <div class="player-avatar" style="border:2px solid ${playerColors[player].border}">${avatarSVGs[player]}</div>
        <div class="stats-player-info"><div class="stats-player-name">${player}</div><div class="stats-player-summary">${totalGames>0?totalGames+' parties · '+Math.round(totalWins/totalGames*100)+'% WR':'Aucun match'}</div></div>
      </div><div class="stats-champ-list" id="stats-${player}"></div>`;
    grid.appendChild(card);
    
    const listEl=document.getElementById('stats-'+player);
    if(sorted.length===0){listEl.innerHTML='<div class="no-games">Aucun match</div>';return;}
    sorted.forEach(([champ,data])=>{
      const wr=Math.round(data.wins/data.games*100);
      listEl.innerHTML += `<div class="stats-champ-row">
        <img class="stats-champ-icon" src="${getChampIcon(champ)}" onerror="this.style.display='none'">
        <span class="stats-champ-name">${champ}</span>
        <span class="stats-kda">${data.deaths>0?((data.kills+data.assists)/data.deaths).toFixed(1):'Perf.'} KDA</span>
        <span class="stats-winrate ${wr>=60?'good':wr<=40?'bad':'mid'}">${wr}% (${data.games}g)</span>
        <span class="stats-dmg">${data.damage>0?Math.round((data.damage/data.games)/1000)+'k dmg':''}</span>
      </div>`;
    });
  });
};

// GESTION DU RECOGNITION SCREENSHOT WORKER OCR
window.handleDragOver = (e) => { e.preventDefault(); document.getElementById('drop-zone').classList.add('dragover'); };
window.handleDragLeave= ()  => { document.getElementById('drop-zone').classList.remove('dragover'); };
window.handleDrop     = (e) => { e.preventDefault(); document.getElementById('drop-zone').classList.remove('dragover'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); };
window.handleFile     = (e) => { if(e.target.files[0]) processFile(e.target.files[0]); };

function matchClubPlayer(detectedName) {
  if (!detectedName) return null;
  const cleanDetected = detectedName.toLowerCase().replace(/[^a-z0-9]/g, '');
  return players.find(p => {
    const cp = p.toLowerCase().replace(/[^a-z0-9]/g, ''), cPs = pseudos[p].toLowerCase().replace(/[^a-z0-9]/g, '');
    return cleanDetected===cp || cleanDetected===cPs || cleanDetected.includes(cp) || cp.includes(cleanDetected) || cleanDetected.includes(cPs) || cPs.includes(cleanDetected);
  }) || null;
}

async function processFile(file) {
  document.getElementById('analyze-result').innerHTML='<div class="analyzing-state"><div class="spinner"></div><p style="color:var(--text-muted);font-size:13px">Analyse en cours...</p></div>';
  try {
    const formData = new FormData(); formData.append("image", file);
    const res = await fetch("http://127.0.0.1:8787/analyze", { method: 'POST', body: formData });
    const rawData = await res.json();
    if (!res.ok || rawData.error) throw new Error(rawData.error || 'Erreur Worker');
    
    const playersArray = Array.isArray(rawData) ? rawData : (rawData.players || []);
    const filteredPlayers = playersArray.map(p => { const name = matchClubPlayer(p.name); return name ? { ...p, playerName: name } : null; }).filter(p => p !== null);
    if(filteredPlayers.length === 0) throw new Error("Aucun membre détecté.");

    showResult({ victory: true, players: filteredPlayers });
  } catch(err) {
    document.getElementById('analyze-result').innerHTML='<div class="error-state">❌ ' + err.message + '</div>';
  }
}

let pendingResult=null;
function showResult(data) {
  pendingResult=data;
  let html=`<div class="result-card">
    <div class="result-header" id="result-victory-header" style="padding:10px 14px; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
      <span>Résultat détecté :</span>
      <select id="match-victory-select" onchange="updateMatchVictory(this.value)" style="background:transparent; color:inherit; border:1px solid currentColor; border-radius:6px; padding:2px 6px; font-size:12px; font-weight:bold; outline:none; cursor:pointer;">
        <option value="win" ${data.victory ? 'selected' : ''} style="background:var(--bg-card); color:#3B6D11;">🏆 Victoire</option>
        <option value="loss" ${!data.victory ? 'selected' : ''} style="background:var(--bg-card); color:#A32D2D;">💀 Défaite</option>
      </select>
    </div>`;

  data.players.forEach((p, index) => {
    let selectChampHtml = `<select class="result-champ-select" onchange="updatePendingChamp(${index}, this.value)">`;
    champions.forEach(c => {
      selectChampHtml += `<option value="${c}" ${p.champion?.toLowerCase().replace(/[^a-z]/g,'') === c.toLowerCase().replace(/[^a-z]/g,'') ? 'selected' : ''}>${c}</option>`;
    });
    selectChampHtml += `</select>`;

    html += `<div class="result-row">
      <img class="result-champ-icon" id="res-img-${index}" src="${getChampIcon(p.champion||'')}" onerror="this.style.display='none'">
      <span class="result-player">${p.playerName}</span><span class="result-champ">${selectChampHtml}</span>
      <span class="result-kda">${p.kills}/${p.deaths||0}/${p.assists}</span><span class="result-dmg">${p.damage?Math.round(p.damage/1000)+'k':'?'}</span>
    </div>`;
  });
  
  document.getElementById('analyze-result').innerHTML = html + `</div><div class="result-actions">
    <button class="btn-retry" onclick="resetScreenshot()">↩ Annuler</button><button class="btn-confirm" onclick="confirmSave()">✓ Confirmer & Enregistrer</button>
  </div>`;
  setTimeout(() => window.updateMatchVictory(data.victory ? 'win' : 'loss'), 10);
}

window.updateMatchVictory = (value) => {
  if (pendingResult) {
    pendingResult.victory = (value === 'win');
    const header = document.getElementById('result-victory-header');
    if (header) {
      header.style.backgroundColor = pendingResult.victory ? 'var(--bg-rec)' : 'var(--bg-ban)';
      header.style.color = pendingResult.victory ? 'var(--text-rec)' : 'var(--text-ban)';
    }
  }
};

window.updatePendingChamp = (index, newChampName) => {
  if (pendingResult?.players[index]) {
    pendingResult.players[index].champion = newChampName;
    const imgEl = document.getElementById('res-img-'+index);
    if(imgEl) { imgEl.src = getChampIcon(newChampName); imgEl.style.display = 'block'; }
  }
};

window.resetScreenshot=()=>{ pendingResult=null; document.getElementById('analyze-result').innerHTML=''; document.getElementById('file-input').value=''; };
window.confirmSave=async()=>{
  if(!pendingResult) return;
  await push(ref(db,'games'),{...pendingResult,timestamp:Date.now()});
  document.getElementById('analyze-result').innerHTML='<div style="background:var(--bg-rec);border-radius:10px;padding:14px;color:var(--text-rec);font-size:13px;margin-top:12px;font-weight:600">✅ Match validé, statistiques synchronisées !</div>';
  pendingResult=null;
  setTimeout(() => { window.resetScreenshot(); window.switchTab('history'); }, 1500);
};
