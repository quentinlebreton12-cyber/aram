* { box-sizing: border-box; margin: 0; padding: 0; }

/* 1. CONFIGURATION DES THEMES (VARIABLES) */
:root {
  --bg-body: #f4f3ef;
  --text-body: #1a1a1a;
  --bg-card: #fff;
  --border-color: #e0e0e0;
  --border-input: #ddd;
  --bg-input: #f8f8f8;
  --text-muted: #666;
  --text-light: #888;
  --text-very-light: #aaa;
  --row-hover: #f5f5f5;
  --overlay-bg: rgba(0,0,0,0.4);
  --picker-bg: #fff;
  --cancel-btn-bg: #f0f0f0;
  --cancel-btn-hover: #e8e8e8;
  --bg-rec: #EAF3DE;
  --bg-rec-hover: #C0DD97;
  --bg-ban: #FCEBEB;
  --bg-ban-hover: #F7C1C1;
  --text-rec: #3B6D11;
  --text-ban: #A32D2D;
}

[data-theme="dark"] {
  --bg-body: #16161a;
  --text-body: #fffffe;
  --bg-card: #242629;
  --border-color: #333436;
  --border-input: #444649;
  --bg-input: #16161a;
  --text-muted: #94a1b2;
  --text-light: #94a1b2;
  --text-very-light: #72757e;
  --row-hover: #2d3034;
  --overlay-bg: rgba(0,0,0,0.6);
  --picker-bg: #242629;
  --cancel-btn-bg: #16161a;
  --cancel-btn-hover: #2d3034;

  --bg-ban: #3a1c1c;
  --bg-ban-hover: #522525;
  --text-rec: #7ecb7e;
  --text-ban: #ff8585;
}

/* 2. STYLES APPLIQUANT LES VARIABLES */
body { font-family: system-ui, sans-serif; background: var(--bg-body); color: var(--text-body); min-height: 100vh; transition: background 0.2s, color 0.2s; }
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { padding-bottom: 1rem; border-bottom: 1px solid var(--border-input); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: flex-start; }
.header h1 { font-size: 20px; font-weight: 500; }
.header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.legend { display: flex; gap: 16px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; }

/* Bouton Dark Mode */
.theme-toggle { background: transparent; border: 1px solid var(--border-input); padding: 6px 12px; border-radius: 8px; cursor: pointer; color: var(--text-body); display: flex; align-items: center; gap: 6px; font-size: 12px; transition: all 0.1s; }
.theme-toggle:hover { background: var(--row-hover); border-color: var(--text-very-light); }

.players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.player-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: background 0.2s, border-color 0.2s; }
.player-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); }
