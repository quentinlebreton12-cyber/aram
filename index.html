<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAM Bans</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-body: #f4f3ef; --text-body: #1a1a1a; --bg-card: #fff;
  --border-color: #e0e0e0; --border-input: #ddd; --bg-input: #f8f8f8;
  --text-muted: #666; --text-light: #888; --text-very-light: #aaa;
  --row-hover: #f5f5f5; --overlay-bg: rgba(0,0,0,0.4); --picker-bg: #fff;
  --cancel-btn-bg: #f0f0f0; --cancel-btn-hover: #e8e8e8;
  --bg-rec: #EAF3DE; --bg-rec-hover: #C0DD97;
  --bg-ban: #FCEBEB; --bg-ban-hover: #F7C1C1;
  --text-rec: #3B6D11; --text-ban: #A32D2D;
}
[data-theme="dark"] {
  --bg-body: #16161a; --text-body: #fffffe; --bg-card: #242629;
  --border-color: #333436; --border-input: #444649; --bg-input: #16161a;
  --text-muted: #94a1b2; --text-light: #94a1b2; --text-very-light: #72757e;
  --row-hover: #2d3034; --overlay-bg: rgba(0,0,0,0.6); --picker-bg: #242629;
  --cancel-btn-bg: #16161a; --cancel-btn-hover: #2d3034;
  --bg-rec: #1b2e1b; --bg-rec-hover: #244124;
  --bg-ban: #3a1c1c; --bg-ban-hover: #522525;
  --text-rec: #7ecb7e; --text-ban: #ff8585;
}
body { font-family: system-ui, sans-serif; background: var(--bg-body); color: var(--text-body); min-height: 100vh; transition: background 0.2s, color 0.2s; }
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { padding-bottom: 1rem; border-bottom: 1px solid var(--border-input); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: flex-start; }
.header h1 { font-size: 20px; font-weight: 500; }
.header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.legend { display: flex; gap: 16px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.theme-toggle { background: transparent; border: 1px solid var(--border-input); padding: 6px 12px; border-radius: 8px; cursor: pointer; color: var(--text-body); display: flex; align-items: center; gap: 6px; font-size: 12px; white-space: nowrap; transition: all 0.1s; }
.theme-toggle:hover { background: var(--row-hover); }
.players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.player-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: background 0.2s, border-color 0.2s; }
.player-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); }
.player-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.player-name { font-size: 14px; font-weight: 500; color: var(--text-body); }
.player-stats { font-size: 11px; color: var(--text-light); margin-top: 1px; display: flex; gap: 6px; }
.stat-rec { color: var(--text-rec); }
.stat-ban { color: var(--text-ban); }
.search-bar { position: relative; padding: 6px 10px; }
.search-bar input { width: 100%; padding: 5px 8px 5px 28px; font-size: 12px; border: 1px solid var(--border-input); border-radius: 8px; background: var(--bg-input); color: var(--text-body); outline: none; }
.search-bar input:focus { border-color: var(--text-very-light); }
.search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 14px; color: var(--text-very-light); pointer-events: none; }
.champ-list { padding: 4px 0; max-height: 320px; overflow-y: auto; }
.champ-row { display: flex; align-items: center; padding: 4px 8px; gap: 5px; transition: background 0.1s; }
.champ-row:hover { background: var(--row-hover); }
.champ-row.recommended { background: var(--bg-rec); }
.champ-row.recommended:hover { background: var(--bg-rec-hover); }
.champ-row.banned { background: var(--bg-ban); }
.champ-row.banned:hover { background: var(--bg-ban-hover); }
.champ-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-body); }
.champ-row.recommended .champ-name { color: var(--text-rec); font-weight: 500; }
.champ-row.banned .champ-name { color: var(--text-ban); font-weight: 500; text-decoration: line-through; }
.vote-area { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.vbtn { width: 20px; height: 20px; border: 1px solid var(--border-input); border-radius: 5px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text-light); transition: all 0.1s; padding: 0; }
.vbtn.up:hover { background: var(--bg-rec); border-color: #97C459; color: var(--text-rec); }
.vbtn.down:hover { background: var(--bg-ban); border-color: #F09595; color: var(--text-ban); }
.vcnt { font-size: 10px; font-weight: 500; min-width: 14px; text-align: center; color: var(--text-very-light); }
.vcnt.up-active { color: var(--text-rec); }
.vcnt.down-active { color: var(--text-ban); }
.status-badge { font-size: 10px; font-weight: 500; border-radius: 4px; padding: 1px 5px; white-space: nowrap; }
.badge-rec { background: var(--text-rec); color: #fff; }
.badge-ban { background: var(--text-ban); color: #fff; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay-bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
.picker { background: var(--picker-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 1.25rem; width: 280px; color: var(--text-body); }
.picker h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.picker p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
.picker-type-up { border-top: 3px solid #639922; }
.picker-type-down { border-top: 3px solid #A32D2D; }
.voter-list { display: flex; flex-direction: column; gap: 6px; }
.voter-btn { padding: 8px 12px; border: 1px solid var(--border-input); border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.1s; color: var(--text-body); }
.voter-btn:hover { background: var(--row-hover); }
.voter-btn.already-voted { border-color: var(--text-ban); color: var(--text-ban); background: var(--bg-ban); display: flex; justify-content: space-between; align-items: center; }
.voter-btn.already-voted:hover { background: var(--bg-ban-hover); }
.cancel-btn { margin-top: 10px; width: 100%; padding: 8px; border: none; border-radius: 8px; background: var(--cancel-btn-bg); cursor: pointer; font-size: 13px; color: var(--text-muted); }
.cancel-btn:hover { background: var(--cancel-btn-hover); }
.footer { text-align: center; font-size: 11px; color: var(--text-very-light); padding: 1.5rem 0 0.5rem; }

/* BOTTOM PANELS */
.bottom-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
@media (max-width: 600px) { .bottom-panels { grid-template-columns: 1fr; } }

/* TEAM COMP */
.team-slots { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px; }
.champ-slot { display: flex; flex-direction: column; align-items: center; gap: 5px; }
.champ-slot img { width: 52px; height: 52px; border-radius: 8px; border: 2px solid var(--border-color); object-fit: cover; background: var(--bg-input); transition: border-color 0.2s; }
.champ-slot img.rec { border-color: #639922; }
.champ-slot img.banned-for { border-color: var(--text-ban); opacity: 0.5; }
.champ-slot .slot-name { font-size: 11px; font-weight: 500; color: var(--text-body); text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.champ-slot .slot-role { font-size: 10px; color: var(--text-muted); text-align: center; }
.team-empty { font-size: 12px; color: var(--text-very-light); padding: 12px; }

/* FUN STATS */
.fun-stats-list { display: flex; flex-direction: column; gap: 8px; padding: 12px; font-size: 13px; }
.fun-stat-row { display: flex; align-items: center; gap: 8px; }
.fun-stat-emoji { font-size: 16px; flex-shrink: 0; }
.fun-stat-text { color: var(--text-body); }
.fun-stat-text b { color: var(--text-body); }
.fun-stat-text .empty { color: var(--text-very-light); font-style: italic; }
</style>
<script>
  if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1><i class="ti ti-sword" style="font-size:18px;vertical-align:-2px;margin-right:6px"></i>Bans ARAM</h1>
      <p>3 votes requis pour verrouiller un statut</p>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#639922"></div> Fortement recommandé</div>
        <div class="legend-item"><div class="dot" style="background:#A32D2D"></div> Banni</div>
      </div>
    </div>
    <button id="theme-toggle" class="theme-toggle">
      <i class="ti ti-moon" id="theme-icon"></i> <span id="theme-text">Mode Sombre</span>
    </button>
  </div>

  <div class="players-grid" id="players-grid"></div>

  <div class="bottom-panels">
    <!-- Équipe type -->
    <div class="player-card">
      <div class="player-header">
        <div class="player-avatar" style="background:#FFD966;color:#8A5A00"><i class="ti ti-crown"></i></div>
        <div>
          <div class="player-name">Équipe type ARAM</div>
          <div class="player-stats"><span>Composition optimale selon les votes</span></div>
        </div>
      </div>
      <div id="team-content"></div>
    </div>

    <!-- Stats fun -->
    <div class="player-card">
      <div class="player-header">
        <div class="player-avatar" style="background:#D6CCFF;color:#4E3BB3"><i class="ti ti-chart-bar"></i></div>
        <div>
          <div class="player-name">Stats inutiles mais importantes</div>
          <div class="player-stats"><span>Analyse totalement scientifique</span></div>
        </div>
      </div>
      <div id="fun-content"></div>
    </div>
  </div>

  <div class="footer">3 votes requis pour verrouiller un statut</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this) window.closePicker()">
  <div class="picker" id="picker">
    <h3 id="picker-title"></h3>
    <p id="picker-sub"></p>
    <div class="voter-list" id="voter-list"></div>
    <button class="cancel-btn" onclick="window.closePicker()">Fermer</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDndpGMcH8iXz7ytKpYWBHGy4nmxC0fChE",
  authDomain: "aram-22ce9.firebaseapp.com",
  databaseURL: "https://aram-22ce9-default-rtdb.firebaseio.com",
  projectId: "aram-22ce9",
  storageBucket: "aram-22ce9.firebasestorage.app",
  messagingSenderId: "948111492330",
  appId: "1:948111492330:web:2217feb3f450e3e31a4393"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// CDN Riot pour les icônes champions
const DDRAGON = "https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/";
// Mapping nom champion → clé CDN (pour les cas spéciaux)
const champKey = {
  "Aurelion Sol": "AurelionSol", "Bel'Veth": "Belveth", "Cho'Gath": "Chogath",
  "Dr. Mundo": "DrMundo", "Jarvan IV": "JarvanIV", "Kai'Sa": "Kaisa",
  "Kha'Zix": "Khazix", "Kog'Maw": "KogMaw", "LeBlanc": "Leblanc",
  "Lee Sin": "LeeSin", "Master Yi": "MasterYi", "Miss Fortune": "MissFortune",
  "Nunu & Willump": "Nunu", "Rek'Sai": "RekSai", "Renata Glasc": "Renata",
  "Tahm Kench": "TahmKench", "Twisted Fate": "TwistedFate", "Vel'Koz": "Velkoz",
  "Xin Zhao": "XinZhao", "K'Sante": "KSante", "Wukong": "MonkeyKing"
};
function getChampIcon(name) {
  const key = champKey[name] || name.replace(/[^a-zA-Z]/g, '');
  return DDRAGON + key + ".png";
}

// Thème
const toggleBtn = document.getElementById('theme-toggle');
const themeIcon = document.getElementById('theme-icon');
const themeText = document.getElementById('theme-text');
if (document.documentElement.getAttribute('data-theme') === 'dark') {
  themeIcon.className = 'ti ti-sun'; themeText.textContent = 'Mode Clair';
}
toggleBtn.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', 'light');
    themeIcon.className = 'ti ti-moon'; themeText.textContent = 'Mode Sombre';
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
    themeIcon.className = 'ti ti-sun'; themeText.textContent = 'Mode Clair';
  }
});

const THRESHOLD = 3;
const players = ["Manu","Arthur","Nathan","Quentin","Aymeric","Vincent"];
const playerColors = {
  Manu:    { avatar:"#B5D4F4", text:"#185FA5" },
  Arthur:  { avatar:"#F7C1C1", text:"#A32D2D" },
  Nathan:  { avatar:"#C0DD97", text:"#3B6D11" },
  Quentin: { avatar:"#FAC775", text:"#854F0B" },
  Aymeric: { avatar:"#CECBF6", text:"#534AB7" },
  Vincent: { avatar:"#9FE1CB", text:"#0F6E56" },
};
const champions = ["Aatrox","Ahri","Akali","Akshan","Alistar","Ambessa","Amumu","Anivia","Annie","Aphelios","Ashe","Aurelion Sol","Aurora","Azir","Bard","Bel'Veth","Blitzcrank","Brand","Braum","Briar","Caitlyn","Camille","Cassiopeia","Cho'Gath","Corki","Darius","Diana","Dr. Mundo","Draven","Ekko","Elise","Evelynn","Ezreal","Fiddlesticks","Fiora","Fizz","Galio","Gangplank","Garen","Gnar","Gragas","Graves","Gwen","Hecarim","Heimerdinger","Hwei","Illaoi","Irelia","Ivern","Janna","Jarvan IV","Jax","Jayce","Jhin","Jinx","K'Sante","Kai'Sa","Kalista","Karma","Karthus","Kassadin","Katarina","Kayle","Kayn","Kennen","Kha'Zix","Kindred","Kled","Kog'Maw","LeBlanc","Lee Sin","Leona","Lillia","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Master Yi","Milio","Miss Fortune","Mordekaiser","Morgana","Naafiri","Nami","Nasus","Nautilus","Neeko","Nidalee","Nilah","Nocturne","Nunu & Willump","Olaf","Orianna","Ornn","Pantheon","Poppy","Pyke","Qiyana","Quinn","Rakan","Rammus","Rek'Sai","Rell","Renata Glasc","Renekton","Rengar","Riven","Rumble","Ryze","Samira","Sejuani","Senna","Seraphine","Sett","Shaco","Shen","Shyvana","Singed","Sion","Sivir","Skarner","Smolder","Sona","Soraka","Swain","Sylas","Syndra","Tahm Kench","Taliyah","Talon","Taric","Teemo","Thresh","Tristana","Trundle","Tryndamere","Twisted Fate","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vel'Koz","Vex","Vi","Viego","Viktor","Vladimir","Volibear","Warwick","Wukong","Xayah","Xerath","Xin Zhao","Yasuo","Yone","Yorick","Yunara","Yuumi","Zac","Zaahen","Zed","Zeri","Ziggs","Zilean","Zoe","Zyra"];

const championRoles = {
  "Leona":"tank","Nautilus":"tank","Maokai":"tank","Ornn":"tank","Malphite":"tank",
  "Amumu":"tank","Rammus":"tank","Sion":"tank","Tahm Kench":"tank","Braum":"tank",
  "Cho'Gath":"tank","Galio":"tank","Poppy":"tank","Volibear":"tank",
  "Jinx":"adc","Caitlyn":"adc","Varus":"adc","Ashe":"adc","Senna":"adc",
  "Miss Fortune":"adc","Kai'Sa":"adc","Ezreal":"adc","Lucian":"adc","Jhin":"adc",
  "Kog'Maw":"adc","Zeri":"adc","Vayne":"adc","Twitch":"adc","Sivir":"adc",
  "Lux":"ap","Xerath":"ap","Ziggs":"ap","Brand":"ap","Veigar":"ap",
  "Hwei":"ap","Viktor":"ap","Syndra":"ap","Swain":"ap","Vel'Koz":"ap",
  "Anivia":"ap","Annie":"ap","Aurelion Sol":"ap","Azir":"ap","Cassiopeia":"ap",
  "Ekko":"ap","Lissandra":"ap","Orianna":"ap","Taliyah":"ap","Zoe":"ap",
  "Soraka":"support","Sona":"support","Janna":"support","Nami":"support",
  "Lulu":"support","Milio":"support","Renata Glasc":"support","Taric":"support",
  "Seraphine":"support","Yuumi":"support","Bard":"support","Karma":"support","Thresh":"support"
};

let upVotes = {};
let downVotes = {};
const searches = {};
players.forEach(p => { upVotes[p] = {}; downVotes[p] = {}; searches[p] = ""; });
let pendingVote = null;

const getUp   = (t, c) => (upVotes[t]   && upVotes[t][c])   ? upVotes[t][c]   : new Set();
const getDown = (t, c) => (downVotes[t] && downVotes[t][c]) ? downVotes[t][c] : new Set();
const isRec    = (t, c) => getUp(t, c).size   >= THRESHOLD;
const isBanned = (t, c) => getDown(t, c).size >= THRESHOLD;

// Build UI first, then connect Firebase
buildGrid();
renderTeamComp();
renderFunStats();

onValue(ref(db, 'votes'), (snapshot) => {
  const data = snapshot.val() || {};
  players.forEach(p => { upVotes[p] = {}; downVotes[p] = {}; });

  if (data.upVotes) {
    for (const target in data.upVotes)
      for (const champ in data.upVotes[target]) {
        if (!upVotes[target]) upVotes[target] = {};
        upVotes[target][champ] = new Set(Object.keys(data.upVotes[target][champ]));
      }
  }
  if (data.downVotes) {
    for (const target in data.downVotes)
      for (const champ in data.downVotes[target]) {
        if (!downVotes[target]) downVotes[target] = {};
        downVotes[target][champ] = new Set(Object.keys(data.downVotes[target][champ]));
      }
  }

  players.forEach(p => renderPlayer(p));
  renderTeamComp();
  renderFunStats();
});

// ── Picker ──────────────────────────────────────────────
function openPicker(type, target, champ) {
  if (type === 'up'   && isRec(target, champ))    return;
  if (type === 'down' && isBanned(target, champ)) return;
  pendingVote = { type, target, champ };
  const voters = type === 'up' ? getUp(target, champ) : getDown(target, champ);
  const label  = type === 'up' ? 'Recommander' : 'Bannir';
  document.getElementById('picker-title').textContent = label + ' ' + champ + ' pour ' + target;
  document.getElementById('picker-sub').textContent   = voters.size + '/' + THRESHOLD + ' votes — qui es-tu ?';
  document.getElementById('picker').className = 'picker picker-type-' + type;
  const list = document.getElementById('voter-list');
  list.innerHTML = '';
  players.filter(p => p !== target).forEach(voter => {
    const already = voters.has(voter);
    const btn = document.createElement('button');
    if (already) {
      btn.className = 'voter-btn already-voted';
      btn.innerHTML = '<span>' + voter + '</span><i class="ti ti-x"></i>';
      btn.title = 'Retirer mon vote';
      btn.onclick = () => window.removeVote(voter);
    } else {
      btn.className = 'voter-btn';
      btn.textContent = voter;
      btn.onclick = () => window.castVote(voter);
    }
    list.appendChild(btn);
  });
  document.getElementById('overlay').style.display = 'flex';
}

window.closePicker = () => { document.getElementById('overlay').style.display = 'none'; pendingVote = null; };

window.castVote = (voter) => {
  const { type, target, champ } = pendingVote;
  set(ref(db, 'votes/' + (type==='up'?'upVotes':'downVotes') + '/' + target + '/' + champ + '/' + voter), true)
    .then(() => window.closePicker());
};

window.removeVote = (voter) => {
  const { type, target, champ } = pendingVote;
  set(ref(db, 'votes/' + (type==='up'?'upVotes':'downVotes') + '/' + target + '/' + champ + '/' + voter), null)
    .then(() => window.closePicker());
};

// ── Render player column ─────────────────────────────────
function renderPlayer(player) {
  const card = document.getElementById('card-' + player);
  if (!card) return;
  const search   = searches[player].toLowerCase();
  let filtered   = champions.filter(c => c.toLowerCase().includes(search));

  filtered.sort((a, b) => {
    const bA = isBanned(player, a), bB = isBanned(player, b);
    if (bA && !bB) return -1; if (!bA && bB) return 1;
    const rA = isRec(player, a),    rB = isRec(player, b);
    if (rA && !rB) return -1; if (!rA && rB) return 1;
    const vA = getUp(player,a).size + getDown(player,a).size;
    const vB = getUp(player,b).size + getDown(player,b).size;
    if (vA !== vB) return vB - vA;
    return a.localeCompare(b);
  });

  const recCount = champions.filter(c => isRec(player, c)).length;
  const banCount = champions.filter(c => isBanned(player, c)).length;
  const statsEl  = card.querySelector('.player-stats');
  const parts = [];
  if (recCount > 0) parts.push('<span class="stat-rec">' + recCount + ' rec.</span>');
  if (banCount > 0) parts.push('<span class="stat-ban">' + banCount + ' ban' + (banCount>1?'s':'') + '</span>');
  statsEl.innerHTML = parts.length ? parts.join('<span style="color:var(--border-input)"> · </span>') : '<span>aucun statut</span>';

  const listEl = card.querySelector('.champ-list');
  listEl.innerHTML = '';

  filtered.forEach(champ => {
    const rec    = isRec(player, champ);
    const banned = isBanned(player, champ);
    const upV    = getUp(player, champ);
    const downV  = getDown(player, champ);
    const row    = document.createElement('div');
    row.className = 'champ-row' + (rec ? ' recommended' : banned ? ' banned' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'champ-name';
    nameEl.textContent = champ;
    row.appendChild(nameEl);

    if (rec || banned) {
      const badge = document.createElement('span');
      badge.className = 'status-badge ' + (rec ? 'badge-rec' : 'badge-ban');
      badge.title     = 'Par : ' + Array.from(rec ? upV : downV).join(', ');
      badge.textContent = rec ? 'recommandé' : 'banni';
      row.appendChild(badge);
    } else {
      const va = document.createElement('div');
      va.className = 'vote-area';

      const uCnt = document.createElement('span');
      uCnt.className = 'vcnt' + (upV.size > 0 ? ' up-active' : '');
      uCnt.textContent = upV.size > 0 ? upV.size : '';
      uCnt.title = upV.size > 0 ? 'Votes de : ' + Array.from(upV).join(', ') : '';

      const uBtn = document.createElement('button');
      uBtn.className = 'vbtn up'; uBtn.title = 'Recommander';
      uBtn.innerHTML = '<i class="ti ti-thumb-up"></i>';
      uBtn.onclick = () => openPicker('up', player, champ);

      const dCnt = document.createElement('span');
      dCnt.className = 'vcnt' + (downV.size > 0 ? ' down-active' : '');
      dCnt.textContent = downV.size > 0 ? downV.size : '';
      dCnt.title = downV.size > 0 ? 'Votes de : ' + Array.from(downV).join(', ') : '';

      const dBtn = document.createElement('button');
      dBtn.className = 'vbtn down'; dBtn.title = 'Bannir';
      dBtn.innerHTML = '<i class="ti ti-thumb-down"></i>';
      dBtn.onclick = () => openPicker('down', player, champ);

      va.append(uCnt, uBtn, dCnt, dBtn);
      row.appendChild(va);
    }
    listEl.appendChild(row);
  });
}

function buildGrid() {
  const grid = document.getElementById('players-grid');
  players.forEach(player => {
    const col  = playerColors[player];
    const card = document.createElement('div');
    card.className = 'player-card';
    card.id = 'card-' + player;
    card.innerHTML =
      '<div class="player-header">' +
        '<div class="player-avatar" style="background:' + col.avatar + ';color:' + col.text + '">' + player.slice(0,2).toUpperCase() + '</div>' +
        '<div><div class="player-name">' + player + '</div><div class="player-stats"><span>aucun statut</span></div></div>' +
      '</div>' +
      '<div class="search-bar"><i class="ti ti-search"></i><input type="text" placeholder="Chercher..." id="search-' + player + '"></div>' +
      '<div class="champ-list"></div>';
    grid.appendChild(card);
    document.getElementById('search-' + player).addEventListener('input', function() {
      searches[player] = this.value; renderPlayer(player);
    });
  });
}

// ── Score champion pour équipe type ─────────────────────
function champScore(champ) {
  let score = 0;
  players.forEach(p => {
    score += getUp(p, champ).size * 3;
    score -= getDown(p, champ).size * 2;
    if (isRec(p, champ))    score += 10;
    if (isBanned(p, champ)) score -= 15;
  });
  return score;
}

function bestForRole(role, used) {
  return champions
    .filter(c => championRoles[c] === role && !used.has(c))
    .sort((a, b) => champScore(b) - champScore(a))[0] || null;
}

function renderTeamComp() {
  const used = new Set();
  const roles = [
    { key: 'tank',    label: 'Tank'    },
    { key: 'adc',     label: 'ADC'     },
    { key: 'ap',      label: 'AP'      },
    { key: 'support', label: 'Support' },
  ];
  const slots = roles.map(r => { const c = bestForRole(r.key, used); if (c) used.add(c); return { champ: c, label: r.label }; });
  // Flex : best champion pas encore utilisé
  const flex = champions.filter(c => !used.has(c)).sort((a,b) => champScore(b) - champScore(a))[0] || null;
  slots.push({ champ: flex, label: 'Flex' });

  const container = document.getElementById('team-content');
  if (slots.every(s => !s.champ)) {
    container.innerHTML = '<div class="team-empty">Votez pour voir apparaître une équipe type !</div>';
    return;
  }

  container.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'team-slots';
  slots.forEach(({ champ, label }) => {
    if (!champ) return;
    const isBannedSomewhere = players.some(p => isBanned(p, champ));
    const isRecSomewhere    = players.some(p => isRec(p, champ));
    const slot = document.createElement('div');
    slot.className = 'champ-slot';
    const img = document.createElement('img');
    img.src = getChampIcon(champ);
    img.alt = champ;
    img.title = champ + (isRecSomewhere ? ' ✅ recommandé' : '') + (isBannedSomewhere ? ' ⚠️ banni pour certains' : '');
    if (isRecSomewhere)    img.classList.add('rec');
    if (isBannedSomewhere) img.classList.add('banned-for');
    img.onerror = function() { this.style.display='none'; };
    slot.appendChild(img);
    const name = document.createElement('div');
    name.className = 'slot-name';
    name.textContent = champ;
    slot.appendChild(name);
    const roleEl = document.createElement('div');
    roleEl.className = 'slot-role';
    roleEl.textContent = label;
    slot.appendChild(roleEl);
    wrap.appendChild(slot);
  });
  container.appendChild(wrap);
}

// ── Stats fun ─────────────────────────────────────────────
function renderFunStats() {
  let biggestVictim = null, biggestVictimBans = 0;
  let mostGateau    = null, mostGateauRecs    = 0;
  let mostControversialChamp = null, controversialScore = -1;
  let mostVotedChamp = null, mostVotedScore = -1;

  players.forEach(p => {
    const bans = champions.filter(c => isBanned(p, c)).length;
    const recs = champions.filter(c => isRec(p, c)).length;
    if (bans > biggestVictimBans) { biggestVictim = p; biggestVictimBans = bans; }
    if (recs > mostGateauRecs)    { mostGateau    = p; mostGateauRecs    = recs; }
  });

  champions.forEach(c => {
    let totalVotes = 0, upTotal = 0, downTotal = 0;
    players.forEach(p => {
      upTotal   += getUp(p, c).size;
      downTotal += getDown(p, c).size;
    });
    totalVotes = upTotal + downTotal;
    const controversy = Math.min(upTotal, downTotal);
    if (controversy > controversialScore) { controversialScore = controversy; mostControversialChamp = c; }
    if (totalVotes  > mostVotedScore)     { mostVotedScore     = totalVotes;  mostVotedChamp = c; }
  });

  const rows = [
    { emoji: '🎯', text: 'Joueur le plus ciblé',       value: biggestVictim       ? biggestVictim + ' (' + biggestVictimBans + ' ban' + (biggestVictimBans>1?'s':'') + ')' : null },
    { emoji: '👑', text: 'Joueur le plus gâté',         value: mostGateau          ? mostGateau + ' (' + mostGateauRecs + ' rec.)' : null },
    { emoji: '🔥', text: 'Champion le plus controversé', value: mostControversialChamp && controversialScore > 0 ? mostControversialChamp : null },
    { emoji: '📊', text: 'Champion le plus voté',        value: mostVotedChamp      && mostVotedScore > 0 ? mostVotedChamp + ' (' + mostVotedScore + ' votes)' : null },
  ];

  const container = document.getElementById('fun-content');
  const list = document.createElement('div');
  list.className = 'fun-stats-list';
  rows.forEach(({ emoji, text, value }) => {
    const row = document.createElement('div');
    row.className = 'fun-stat-row';
    row.innerHTML = '<span class="fun-stat-emoji">' + emoji + '</span>' +
      '<span class="fun-stat-text">' + text + ' : ' +
        (value ? '<b>' + value + '</b>' : '<span class="empty">pas encore de données</span>') +
      '</span>';
    list.appendChild(row);
  });
  container.innerHTML = '';
  container.appendChild(list);
}
</script>
