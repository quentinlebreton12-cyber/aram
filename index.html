<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAM Bans</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* CSS inchangé */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f4f3ef; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { padding-bottom: 1rem; border-bottom: 1px solid #ddd; margin-bottom: 1.25rem; }
.header h1 { font-size: 20px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }
.legend { display: flex; gap: 16px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.players-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
.player-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
.player-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #e0e0e0; }
.player-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }
.player-name { font-size: 14px; font-weight: 500; }
.player-stats { font-size: 11px; color: #888; margin-top: 1px; display: flex; gap: 6px; }
.stat-rec { color: #3B6D11; }
.stat-ban { color: #A32D2D; }
.search-bar { position: relative; padding: 6px 10px; }
.search-bar input { width: 100%; padding: 5px 8px 5px 28px; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; background: #f8f8f8; color: #1a1a1a; outline: none; }
.search-bar input:focus { border-color: #aaa; }
.search-bar i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #aaa; pointer-events: none; }
.champ-list { padding: 4px 0; max-height: 320px; overflow-y: auto; }
.champ-row { display: flex; align-items: center; padding: 4px 8px; gap: 5px; transition: background 0.1s; }
.champ-row:hover { background: #f5f5f5; }
.champ-row.recommended { background: #EAF3DE; }
.champ-row.recommended:hover { background: #C0DD97; }
.champ-row.banned { background: #FCEBEB; }
.champ-row.banned:hover { background: #F7C1C1; }
.champ-name { font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.champ-row.recommended .champ-name { color: #3B6D11; font-weight: 500; }
.champ-row.banned .champ-name { color: #A32D2D; font-weight: 500; text-decoration: line-through; }
.vote-area { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.vbtn { width: 20px; height: 20px; border: 1px solid #ddd; border-radius: 5px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #888; transition: all 0.1s; padding: 0; }
.vbtn.up:hover { background: #EAF3DE; border-color: #97C459; color: #3B6D11; }
.vbtn.down:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
.vcnt { font-size: 10px; font-weight: 500; min-width: 14px; text-align: center; color: #aaa; }
.vcnt.up-active { color: #3B6D11; }
.vcnt.down-active { color: #A32D2D; }
.status-badge { font-size: 10px; font-weight: 500; border-radius: 4px; padding: 1px 5px; white-space: nowrap; }
.badge-rec { background: #3B6D11; color: #EAF3DE; }
.badge-ban { background: #A32D2D; color: #FCEBEB; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.picker { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.25rem; width: 280px; }
.picker h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.picker p { font-size: 12px; color: #666; margin-bottom: 12px; }
.picker-type-up { border-top: 3px solid #639922; }
.picker-type-down { border-top: 3px solid #A32D2D; }
.voter-list { display: flex; flex-direction: column; gap: 6px; }
.voter-btn { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; background: transparent; cursor: pointer; font-size: 13px; text-align: left; transition: background 0.1s; }
.voter-btn:hover { background: #f5f5f5; }
.voter-btn.already-voted { opacity: 0.4; cursor: not-allowed; }
.cancel-btn { margin-top: 10px; width: 100%; padding: 8px; border: none; border-radius: 8px; background: #f0f0f0; cursor: pointer; font-size: 13px; color: #666; }
.cancel-btn:hover { background: #e8e8e8; }
.footer { text-align: center; font-size: 11px; color: #aaa; padding: 1.5rem 0 0.5rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="ti ti-sword" style="font-size:18px;vertical-align:-2px;margin-right:6px"></i>Bans ARAM</h1>
    <p>3 votes requis pour verrouiller un statut</p>
    <div class="legend">
      <div class="legend-item"><div class="dot" style="background:#639922"></div> Fortement recommandé</div>
      <div class="legend-item"><div class="dot" style="background:#A32D2D"></div> Banni</div>
    </div>
  </div>
  <div class="players-grid" id="players-grid"></div>
  <div class="footer">3 votes requis pour verrouiller un statut</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this) window.closePicker()">
  <div class="picker" id="picker">
    <h3 id="picker-title"></h3>
    <p id="picker-sub"></p>
    <div class="voter-list" id="voter-list"></div>
    <button class="cancel-btn" onclick="window.closePicker()">Annuler</button>
  </div>
</div>

<!-- L'attribut type="module" est OBLIGATOIRE pour pouvoir importer Firebase -->
<script type="module">
// 1. IMPORTATION DE FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// 2. TA CONFIGURATION FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDndpGMcH8iXz7ytKpYWBHGy4nmxC0fChE",
  authDomain: "aram-22ce9.firebaseapp.com",
  databaseURL: "https://aram-22ce9-default-rtdb.firebaseio.com",
  projectId: "aram-22ce9",
  storageBucket: "aram-22ce9.firebasestorage.app",
  messagingSenderId: "948111492330",
  appId: "1:948111492330:web:2217feb3f450e3e31a4393",
  measurementId: "G-BPYG57WLG4"
};

// INITIALISATION
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 3. LOGIQUE DU JEU
const THRESHOLD = 3;
const players = ["Manu","Arthur","Nathan","Quentin","Aymeric","Vincent"];
const playerColors = {
  Manu:    { avatar:"#B5D4F4", text:"#185FA5" },
  Arthur:  { avatar:"#F7C1C1", text:"#A32D2D" },
  Nathan:  { avatar:"#C0DD97", text:"#3B6D11" },
  Quentin: { avatar:"#FAC775", text:"#854F0B" },
  Aymeric: { avatar:"#CECBF6", text:"#534AB7" },
  Vincent: { avatar:"#9FE1CB", text:"#0F6E56" },
};
const champions = ["Aatrox","Ahri","Akali","Akshan","Alistar","Ambessa","Amumu","Anivia","Annie","Aphelios","Ashe","Aurelion Sol","Aurora","Azir","Bard","Bel'Veth","Blitzcrank","Brand","Braum","Briar","Caitlyn","Camille","Cassiopeia","Cho'Gath","Corki","Darius","Diana","Dr. Mundo","Draven","Ekko","Elise","Evelynn","Ezreal","Fiddlesticks","Fiora","Fizz","Galio","Gangplank","Garen","Gnar","Gragas","Graves","Gwen","Hecarim","Heimerdinger","Hwei","Illaoi","Irelia","Ivern","Janna","Jarvan IV","Jax","Jayce","Jhin","Jinx","K'Sante","Kai'Sa","Kalista","Karma","Karthus","Kassadin","Katarina","Kayle","Kayn","Kennen","Kha'Zix","Kindred","Kled","Kog'Maw","LeBlanc","Lee Sin","Leona","Lillia","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Master Yi","Milio","Miss Fortune","Mordekaiser","Morgana","Naafiri","Nami","Nasus","Nautilus","Neeko","Nidalee","Nilah","Nocturne","Nunu & Willump","Olaf","Orianna","Ornn","Pantheon","Poppy","Pyke","Qiyana","Quinn","Rakan","Rammus","Rek'Sai","Rell","Renata Glasc","Renekton","Rengar","Riven","Rumble","Ryze","Samira","Sejuani","Senna","Seraphine","Sett","Shaco","Shen","Shyvana","Singed","Sion","Sivir","Skarner","Smolder","Sona","Soraka","Swain","Sylas","Syndra","Tahm Kench","Taliyah","Talon","Taric","Teemo","Thresh","Tristana","Trundle","Tryndamere","Twisted Fate","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vel'Koz","Vex","Vi","Viego","Viktor","Vladimir","Volibear","Warwick","Wukong","Xayah","Xerath","Xin Zhao","Yasuo","Yone","Yorick","Yunara","Yuumi","Zac","Zed","Zeri","Ziggs","Zilean","Zoe","Zyra"];

let upVotes = {};
let downVotes = {};
const searches = {};
players.forEach(p => { upVotes[p] = {}; downVotes[p] = {}; searches[p] = ""; });

let pendingVote = null;

const getUp = (t, c) => upVotes[t][c] || new Set();
const getDown = (t, c) => downVotes[t][c] || new Set();
const isRec = (t, c) => getUp(t, c).size >= THRESHOLD;
const isBanned = (t, c) => getDown(t, c).size >= THRESHOLD;

// 4. ÉCOUTE DE LA BASE DE DONNÉES EN TEMPS RÉEL
const votesRef = ref(db, 'votes');
onValue(votesRef, (snapshot) => {
  const data = snapshot.val() || { upVotes: {}, downVotes: {} };
  
  // Réinitialisation des votes locaux
  players.forEach(p => { upVotes[p] = {}; downVotes[p] = {}; });

  // Reconstruction des Sets avec les données de Firebase
  if (data.upVotes) {
    for (const target in data.upVotes) {
      for (const champ in data.upVotes[target]) {
        if (!upVotes[target]) upVotes[target] = {};
        upVotes[target][champ] = new Set(Object.keys(data.upVotes[target][champ]));
      }
    }
  }

  if (data.downVotes) {
    for (const target in data.downVotes) {
      for (const champ in data.downVotes[target]) {
        if (!downVotes[target]) downVotes[target] = {};
        downVotes[target][champ] = new Set(Object.keys(data.downVotes[target][champ]));
      }
    }
  }

  // Mise à jour de l'affichage pour tous les joueurs
  players.forEach(p => renderPlayer(p));
});


function openPicker(type, target, champ) {
  if (type === 'up' && isRec(target, champ)) return;
  if (type === 'down' && isBanned(target, champ)) return;
  pendingVote = { type, target, champ };
  const voters = type === 'up' ? getUp(target, champ) : getDown(target, champ);
  const label = type === 'up' ? 'Recommander' : 'Bannir';
  document.getElementById('picker-title').textContent = label + ' ' + champ + ' pour ' + target;
  document.getElementById('picker-sub').textContent = voters.size + '/' + THRESHOLD + ' votes — qui es-tu ?';
  const picker = document.getElementById('picker');
  picker.className = 'picker picker-type-' + type;
  const list = document.getElementById('voter-list');
  list.innerHTML = '';
  players.filter(p => p !== target).forEach(function(voter) {
    const already = voters.has(voter);
    const btn = document.createElement('button');
    btn.className = 'voter-btn' + (already ? ' already-voted' : '');
    btn.textContent = already ? voter + ' (déjà voté)' : voter;
    if (!already) btn.onclick = function() { window.castVote(voter); };
    list.appendChild(btn);
  });
  document.getElementById('overlay').style.display = 'flex';
}

// Global window attachment for HTML onclick integration
window.closePicker = function() {
  document.getElementById('overlay').style.display = 'none';
  pendingVote = null;
};

window.castVote = function(voter) {
  const type = pendingVote.type;
  const target = pendingVote.target;
  const champ = pendingVote.champ;
  
  // Création du chemin d'enregistrement sur Firebase : votes/upVotes/Target/Champion/Voter
  const basePath = type === 'up' ? 'upVotes' : 'downVotes';
  const voteRef = ref(db, `votes/${basePath}/${target}/${champ}/${voter}`);
  
  // Envoi à Firebase
  set(voteRef, true).then(() => {
    window.closePicker();
  });
};

function renderPlayer(player) {
  const search = searches[player].toLowerCase();
  const filtered = champions.filter(function(c) { return c.toLowerCase().indexOf(search) !== -1; });
  const recCount = champions.filter(function(c) { return isRec(player, c); }).length;
  const banCount = champions.filter(function(c) { return isBanned(player, c); }).length;

  const card = document.getElementById('card-' + player);
  if (!card) return; // Sécurité si le render se déclenche avant la création de la grille
  const statsEl = card.querySelector('.player-stats');
  const parts = [];
  if (recCount > 0) parts.push('<span class="stat-rec">' + recCount + ' rec.</span>');
  if (banCount > 0) parts.push('<span class="stat-ban">' + banCount + ' ban' + (banCount > 1 ? 's' : '') + '</span>');
  statsEl.innerHTML = parts.length ? parts.join('<span style="color:#ccc"> · </span>') : '<span>aucun statut</span>';

  const listEl = card.querySelector('.champ-list');
  listEl.innerHTML = '';

  filtered.forEach(function(champ) {
    const rec = isRec(player, champ);
    const banned = isBanned(player, champ);
    const upV = getUp(player, champ);
    const downV = getDown(player, champ);

    const row = document.createElement('div');
    row.className = 'champ-row' + (rec ? ' recommended' : banned ? ' banned' : '');

    const nameEl = document.createElement('span');
    nameEl.className = 'champ-name';
    nameEl.textContent = champ;
    row.appendChild(nameEl);

    if (rec || banned) {
      const badge = document.createElement('span');
      badge.className = 'status-badge ' + (rec ? 'badge-rec' : 'badge-ban');
      const voters = rec ? upV : downV;
      badge.title = 'Par : ' + Array.from(voters).join(', ');
      badge.textContent = rec ? 'recommandé' : 'banni';
      row.appendChild(badge);
    } else {
      const voteArea = document.createElement('div');
      voteArea.className = 'vote-area';

      const upCnt = document.createElement('span');
      upCnt.className = 'vcnt' + (upV.size > 0 ? ' up-active' : '');
      upCnt.textContent = upV.size > 0 ? upV.size : '';
      upCnt.title = upV.size > 0 ? 'Votes de : ' + Array.from(upV).join(', ') : '';

      const upBtn = document.createElement('button');
      upBtn.className = 'vbtn up';
      upBtn.title = 'Recommander';
      upBtn.innerHTML = '<i class="ti ti-thumb-up"></i>';
      upBtn.onclick = function() { openPicker('up', player, champ); };

      const downCnt = document.createElement('span');
      downCnt.className = 'vcnt' + (downV.size > 0 ? ' down-active' : '');
      downCnt.textContent = downV.size > 0 ? downV.size : '';
      downCnt.title = downV.size > 0 ? 'Votes de : ' + Array.from(downV).join(', ') : '';

      const downBtn = document.createElement('button');
      downBtn.className = 'vbtn down';
      downBtn.title = 'Bannir';
      downBtn.innerHTML = '<i class="ti ti-thumb-down"></i>';
      downBtn.onclick = function() { openPicker('down', player, champ); };

      voteArea.appendChild(upCnt);
      voteArea.appendChild(upBtn);
      voteArea.appendChild(downCnt);
      voteArea.appendChild(downBtn);
      row.appendChild(voteArea);
    }

    listEl.appendChild(row);
  });
}

function buildGrid() {
  const grid = document.getElementById('players-grid');
  players.forEach(function(player) {
    const col = playerColors[player];
    const card = document.createElement('div');
    card.className = 'player-card';
    card.id = 'card-' + player;
    card.innerHTML =
      '<div class="player-header">' +
        '<div class="player-avatar" style="background:' + col.avatar + ';color:' + col.text + '">' + player.slice(0,2).toUpperCase() + '</div>' +
        '<div>' +
          '<div class="player-name">' + player + '</div>' +
          '<div class="player-stats"><span>aucun statut</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="search-bar">' +
        '<i class="ti ti-search"></i>' +
        '<input type="text" placeholder="Chercher..." id="search-' + player + '">' +
      '</div>' +
      '<div class="champ-list"></div>';
    grid.appendChild(card);

    document.getElementById('search-' + player).addEventListener('input', function() {
      searches[player] = this.value;
      renderPlayer(player);
    });

    renderPlayer(player);
  });
}

buildGrid();
</script>
</body>
</html>
